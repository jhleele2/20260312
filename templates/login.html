<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재고·발주 시스템 로그인</title>
  <style>
    :root { --bg: #0f1419; --card: #1a2332; --border: #2d3a4f; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; }
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 2rem; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; width: 100%; max-width: 320px; }
    h1 { font-size: 1.25rem; margin: 0 0 1.5rem; text-align: center; }
    label { display: block; font-size: 0.9rem; color: var(--muted); margin-bottom: 0.35rem; }
    input[type="password"] { width: 100%; padding: 0.5rem 0.75rem; font-size: 1rem; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; margin-bottom: 1rem; }
    button { width: 100%; padding: 0.5rem; font-size: 1rem; background: var(--accent); color: #0f1419; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { opacity: 0.9; }
    .error { color: #f85149; font-size: 0.9rem; margin-bottom: 1rem; text-align: center; }
  </style>
</head>
<body>
  <div class="box">
    <h1>재고·발주 자동화</h1>
    <p style="color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem;">팀 비밀번호를 입력하세요.</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="{{ url_for('login') }}">
      <label for="pw">비밀번호</label>
      <input type="password" id="pw" name="password" placeholder="비밀번호" autofocus>
      <button type="submit">로그인</button>
    </form>
  </div>
</body>
</html>
