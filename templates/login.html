<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재고·발주 시스템 로그인</title>
  <style>
    @font-face {
      font-family: "Youandi Modern";
      src: url("{{ url_for('static', filename='fonts/fontYouandiModernTR.ttf') }}") format("truetype");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    :root {
      --topbar: #1a1a1a;
      --bg: #f5f5f5;
      --card: #ffffff;
      --border: #e8e8e8;
      --text: #1a1a1a;
      --muted: #888888;
      --primary: #b71c1c;
      --primary-hover: #8b0000;
      --error: #c62828;
      --radius: 12px;
      --radius-btn: 10px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Youandi Modern", -apple-system, BlinkMacSystemFont, system-ui, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }
    .topbar {
      background: var(--topbar);
      color: #fff;
      padding: 0.875rem 1.25rem;
      text-align: center;
    }
    .topbar h1 { font-size: 1.125rem; font-weight: 700; margin: 0; }
    .login-wrap { padding: 2rem 1.25rem; display: flex; align-items: center; justify-content: center; }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 2rem 1.75rem;
      width: 100%;
      max-width: 340px;
      border: 1px solid var(--border);
    }
    .card h2 { font-size: 1rem; font-weight: 600; margin: 0 0 0.25rem; color: var(--text); }
    .sub { font-size: 0.8125rem; color: var(--muted); margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.8125rem; font-weight: 500; color: var(--text); margin-bottom: 0.5rem; }
    input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 0.9375rem;
      font-family: inherit;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      color: var(--text);
      margin-bottom: 1.25rem;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { outline: none; border-color: var(--primary); }
    button {
      width: 100%;
      padding: 0.75rem;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: var(--primary-hover); }
    .error { color: var(--error); font-size: 0.8125rem; margin-bottom: 1rem; font-weight: 500; }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>재고·발주 자동화</h1>
  </header>
  <div class="login-wrap">
  <div class="card">
    <h2>로그인</h2>
    <p class="sub">팀 비밀번호를 입력하세요.</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="{{ url_for('login') }}">
      <label for="pw">비밀번호</label>
      <input type="password" id="pw" name="password" placeholder="비밀번호" autofocus>
      <button type="submit">로그인</button>
    </form>
  </div>
  </div>
</body>
</html>
