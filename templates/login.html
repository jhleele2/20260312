<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재고·발주 시스템 로그인</title>
  <style>
    @font-face {
      font-family: "Youandi Modern";
      src: url("{{ url_for('static', filename='fonts/fontYouandiModernTR.ttf') }}") format("truetype");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --border: #e0e0e0;
      --text: #111111;
      --muted: #6b6b6b;
      --primary: #b71c1c;
      --primary-hover: #8b0000;
      --error: #c62828;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-lg: 0 4px 20px rgba(0,0,0,0.1);
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Youandi Modern", "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      border-top: 3px solid var(--primary);
    }
    h1 { font-size: 1.25rem; font-weight: 700; margin: 0 0 0.5rem; color: var(--text); letter-spacing: -0.03em; text-align: center; }
    .sub { font-size: 0.8125rem; color: var(--muted); text-align: center; margin-bottom: 1.5rem; letter-spacing: 0.02em; }
    label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; letter-spacing: 0.04em; text-transform: uppercase; }
    input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 0.9375rem;
      font-family: inherit;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      margin-bottom: 1.25rem;
      transition: border-color 0.2s;
      letter-spacing: 0.02em;
    }
    input[type="password"]:focus { outline: none; border-color: var(--primary); }
    button {
      width: 100%;
      padding: 0.75rem;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.02em;
    }
    button:hover { background: var(--primary-hover); }
    .error { color: var(--error); font-size: 0.8125rem; margin-bottom: 1rem; text-align: center; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <h1>재고·발주 자동화</h1>
    <p class="sub">팀 비밀번호를 입력하세요.</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="{{ url_for('login') }}">
      <label for="pw">비밀번호</label>
      <input type="password" id="pw" name="password" placeholder="비밀번호" autofocus>
      <button type="submit">로그인</button>
    </form>
  </div>
</body>
</html>
