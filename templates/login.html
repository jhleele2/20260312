<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재고·발주 시스템 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f2f2f7;
      --card: #ffffff;
      --border: #e5e5ea;
      --text: #1d1d1f;
      --muted: #8e8e93;
      --primary: #c41e3a;
      --primary-hover: #a01830;
      --error: #ff3b30;
      --radius: 20px;
      --shadow: 0 2px 16px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
    }
    h1 { font-size: 1.375rem; font-weight: 700; margin: 0 0 0.5rem; color: var(--text); letter-spacing: -0.02em; text-align: center; }
    .sub { font-size: 0.875rem; color: var(--muted); text-align: center; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.8125rem; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; }
    input[type="password"] {
      width: 100%;
      padding: 0.875rem 1rem;
      font-size: 1rem;
      font-family: inherit;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      margin-bottom: 1.25rem;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { outline: none; border-color: var(--primary); }
    button {
      width: 100%;
      padding: 0.875rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: var(--primary-hover); }
    .error { color: var(--error); font-size: 0.875rem; margin-bottom: 1rem; text-align: center; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <h1>재고·발주 자동화</h1>
    <p class="sub">팀 비밀번호를 입력하세요.</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="{{ url_for('login') }}">
      <label for="pw">비밀번호</label>
      <input type="password" id="pw" name="password" placeholder="비밀번호" autofocus>
      <button type="submit">로그인</button>
    </form>
  </div>
</body>
</html>
